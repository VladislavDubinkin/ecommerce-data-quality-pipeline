version: 2

models:
  - name: stg_orders
    description: Cleaned order records, one row per order.
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
  - name: stg_order_items
    description: Cleaned order line items.
    columns:
      - name: order_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
  - name: stg_customers
    description: Cleaned customer master data.
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null